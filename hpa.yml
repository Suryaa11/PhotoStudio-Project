apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-deployment-hpa
  namespace: photo-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: photo-app-deploy
  minReplicas: 3 
  maxReplicas: 10
  metrics:
    -  type: Resource
       resource:
         name: cpu
         target:
           type: Utilization
           averageUtilization: 5
       behaviour:
       scaleDown:
         stabilizationWindowSeconds: 30
         policies:
           - type: Percent
             value: 100
             periodSeconds: 15